hydra:
  run:
    dir: ./run_outputs/${hydra.job.override_dirname}
  sweep:
    dir: ./run_outputs/
    subdir: ${hydra.job.override_dirname}
  job:
    config:
      override_dirname:
        exclude_keys:
          - freeze_tcn


source: 'BAL'

exp_type: 'RMS'


freeze_tcn: False

chrono: False


balanced_al: False

weighted_al: True


lr: 0.0001
initial_sample: 50
initial_n_epochs: 2 
budget: 24
n_epochs: 1
batch_size: 12
tcn_batch_size: 8

random_state: 0
